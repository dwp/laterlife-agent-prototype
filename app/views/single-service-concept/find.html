{% extends "layouts/main.html" %}

{% block pageTitle %}
  Find someone – {{ serviceName }} – GOV.UK Prototype Kit
{% endblock %}

{% block header %}

<header data-module="govuk-header" class="dwp-header">
<div class="dwp-header__content govuk-width-container">
<div class="dwp-header__service-name">
  <a href="/index" class="dwp-header__link">{{serviceName}}</a>
</div>
          {% include './_nav.html' %}
</div>
</header>

{% endblock %}

{% block content %}



  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">


      <h1 class="govuk-heading-xl">
      Find someone
      </h1>
<form class="form" method="post">
      <div class="govuk-form-group">
        <label class="govuk-label" for="find-someone">
          National Insurance number
        </label>
        <input class="govuk-input govuk-input--width-20" id="findSomeone" name="findSomeone" type="text">
      </div>

      <button type="submit" class="govuk-button" data-module="govuk-button">
        Find
    </button>
</form>

    </div>





  </div>

{% endblock %}
